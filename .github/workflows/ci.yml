name: ci

on:
  push:
  pull_request:

jobs:
  windows-build-test-pack:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build BekaForge.WorkflowKit.slnx -c Release

      - name: Test
        run: dotnet test tests/BekaForge.WorkflowKit.Tests/BekaForge.WorkflowKit.Tests.csproj -c Release --no-build

      - name: Pack CLI
        run: dotnet pack src/BekaForge.WorkflowKit.Cli/BekaForge.WorkflowKit.Cli.csproj -c Release -o .artifacts/nuget --no-build
